<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Developer Studio</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --border: #44475a;
            --text: #f8f8f2;
            --accent: #bd93f9;
            --user-msg: #8be9fd;
            --ai-msg: #50fa7b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        #chat-panel {
            width: 35%;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border);
            background-color: var(--panel-bg);
        }

        #workspace-panel {
            width: 65%;
            display: flex;
            flex-direction: column;
        }

        #code-section {
            height: 50%;
            border-bottom: 2px solid var(--border);
            background-color: #000;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #f8f8f2;
            white-space: pre-wrap;
        }

        #preview-section {
            height: 50%;
            background-color: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Chat UI */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.4;
        }

        .user-message {
            background-color: #44475a;
            align-self: flex-end;
            color: var(--user-msg);
        }

        .ai-message {
            background-color: #383a59;
            align-self: flex-start;
            color: var(--text);
        }

        .thought-process {
            font-size: 0.85em;
            color: #6272a4;
            font-style: italic;
            margin-bottom: 8px;
            border-left: 2px solid #6272a4;
            padding-left: 10px;
        }

        #input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text);
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            background-color: var(--accent);
            color: #282a36;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: #6272a4;
            cursor: not-allowed;
        }
    </style>
</head>

### How this works:
